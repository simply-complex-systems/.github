name: CI (Python, reusable)

# Reusable Python CI scaffold. Calling pattern:
#
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   jobs:
#     ci:
#       uses: simply-complex-systems/.github/.github/workflows/ci-python-reusable.yml@main
#       with:
#         python-version: "3.12"
#         requirements-file: requirements.txt

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      requirements-file:
        type: string
        default: "requirements.txt"
      run-tests:
        type: boolean
        default: true
      run-lint:
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ inputs.requirements-file }}" ]; then
            pip install -r "${{ inputs.requirements-file }}"
          fi
          pip install ruff pytest

      - name: Lint (ruff)
        if: ${{ inputs.run-lint }}
        run: ruff check .

      - name: Test (pytest)
        if: ${{ inputs.run-tests }}
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null | grep -q . ; then
            pytest -q
          else
            echo "No tests found — skipping."
          fi
