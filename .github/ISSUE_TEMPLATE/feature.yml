name: Feature
description: New capability or improvement to an existing one.
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What does success look like? State the result, not the implementation.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why now
      description: What changes if we don't do this, or what unblocks if we do?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in. What's deliberately out.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bulleted, testable. The list that closes this issue.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P3 — later
        - P2 — next iteration
        - P1 — this iteration
        - P0 — now / blocking
      default: 0
    validations:
      required: true
