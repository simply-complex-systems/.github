name: Ops task
description: Recurring or one-off operational work — refresh content, run a job, rotate a secret, push a deploy.
labels: ["ops", "needs-triage"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: One sentence stating what needs to happen.
    validations:
      required: true
  - type: dropdown
    id: cadence
    attributes:
      label: Cadence
      options:
        - One-off
        - Daily
        - Weekly
        - Bi-weekly
        - Monthly
        - Quarterly
        - Ad-hoc / event-driven
      default: 0
    validations:
      required: true
  - type: input
    id: due
    attributes:
      label: Due / next run
      description: Absolute date if applicable (YYYY-MM-DD).
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: The runbook. Brief is fine — link to docs if longer.
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How we know the task is finished.
    validations:
      required: true
